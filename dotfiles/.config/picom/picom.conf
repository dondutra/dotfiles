backend = "glx";
vsync = true;
corner-radius = 0;

# Transparencia: activa leve en inactivas
inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;

# Excepciones típicas (pantallas completas, etc.)
detect-rounded-corners = true;
detect-client-opacity = true;

# Sombras suaves
shadow = true;
shadow-radius = 10;
shadow-opacity = 0.3;
shadow-offset-x = -7;
shadow-offset-y = -7;

# Evitar efectos raros en menús/teclas
blur-method = none;

# Reglas específicas (ejemplo: terminal transparente ligera)
wintypes:
{
  tooltip = { fade = true; shadow = true; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.98; };
};
